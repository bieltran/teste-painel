version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: orcamento_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "file:/app/backend/data/dev.db"
      JWT_SECRET: "${JWT_SECRET:-super_secret_32_chars_min}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@yourcompany.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin1234}"
      ADMIN_NAME: "${ADMIN_NAME:-Administrator}"
      NODE_ENV: production
      PORT: 3002
      FRONTEND_URL: "http://localhost:3001"
    volumes:
      - sqlite_data:/app/backend/data
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: orcamento_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      VITE_API_URL: "http://localhost:3002/api"
    networks:
      - app-network

volumes:
  sqlite_data:
    driver: local

networks:
  app-network:
    driver: bridge
